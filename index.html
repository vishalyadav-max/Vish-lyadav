<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Password Strength Checker</h1>
            
            <div class="input-group">
                <label for="password">Enter Password:</label>
                <div class="password-input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Enter your password" 
                        class="password-input"
                    >
                    <button class="toggle-password" onclick="togglePassword()">
                        <span class="eye-icon">👁️</span>
                    </button>
                </div>
            </div>

            <!-- Strength Indicator -->
            <div class="strength-indicator">
                <div class="strength-bar">
                    <div class="strength-progress" id="strengthProgress"></div>
                </div>
                <p class="strength-text" id="strengthText">Enter a password</p>
            </div>

            <!-- Requirements Checklist -->
            <div class="requirements">
                <h3>Password Requirements:</h3>
                <div class="requirement-item">
                    <span class="requirement-icon" id="lengthIcon">✗</span>
                    <span>At least 8 characters</span>
                </div>
                <div class="requirement-item">
                    <span class="requirement-icon" id="uppercaseIcon">✗</span>
                    <span>One uppercase letter (A-Z)</span>
                </div>
                <div class="requirement-item">
                    <span class="requirement-icon" id="lowercaseIcon">✗</span>
                    <span>One lowercase letter (a-z)</span>
                </div>
                <div class="requirement-item">
                    <span class="requirement-icon" id="numberIcon">✗</span>
                    <span>One number (0-9)</span>
                </div>
                <div class="requirement-item">
                    <span class="requirement-icon" id="specialIcon">✗</span>
                    <span>One special character (!@#$%^&*)</span>
                </div>
            </div>

            <!-- Password Stats -->
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Length:</span>
                    <span class="stat-value" id="passwordLength">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Complexity:</span>
                    <span class="stat-value" id="complexityScore">0%</span>
                </div>
            </div>

            <!-- Feedback Messages -->
            <div class="feedback" id="feedback"></div>

            <!-- Action Buttons -->
            <div class="button-group">
                <button class="btn btn-generate" onclick="generatePassword()">Generate Strong Password</button>
                <button class="btn btn-copy" onclick="copyPassword()" id="copyBtn" style="display: none;">Copy Password</button>
                <button class="btn btn-clear" onclick="clearPassword()">Clear</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
